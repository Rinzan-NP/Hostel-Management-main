services:
  # Backend API Service
  - type: web
    name: hostel-management-api
    runtime: python
    pythonVersion: 3.11
    rootDir: Backend
    buildCommand: |
      pip install --upgrade pip && \
      pip install Django==6.0.3 djangorestframework django-cors-headers psycopg2-binary python-decouple && \
      python manage.py migrate
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hostel-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
    healthCheckPath: /api/health/

  # Frontend Service
  - type: web
    name: hostel-management-frontend
    runtime: node
    buildCommand: "cd Frontend && npm install && npm run build"
    startCommand: "cd Frontend && npm run preview"
    envVars:
      - key: VITE_API_URL
        value: "https://hostel-management-api.onrender.com/api"

# PostgreSQL Database
databases:
  - name: hostel-db
    plan: free
    version: "15"
